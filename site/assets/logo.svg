<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Lexora">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F3A2C"/>
      <stop offset="100%" stop-color="#3D5444"/>
    </linearGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="32" cy="32" r="29" fill="url(#lg)"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#C8E26A" stroke-width="2"/>
  <!-- inner subtle frame -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#EEEFE2" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>
  <!-- L stroke -->
  <path d="M20 16 L20 44 L31 44" fill="none" stroke="#EEEFE2" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X cross in chartreuse -->
  <path d="M28 22 L44 44" stroke="#C8E26A" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M44 22 L28 44" stroke="#A07859" stroke-width="3.6" stroke-linecap="round"/>
  <!-- ink dot -->
  <circle cx="48" cy="18" r="2.6" fill="#C8E26A"/>
</svg>
